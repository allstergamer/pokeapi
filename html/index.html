
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
    <title>Mini Pokédex</title>
    <link rel="stylesheet" type="text/css" href="../css/main.css">
    <script src="../js/main.js"></script>
</head>
<body>
<h1>Mini Pokédex</h1>

<input type="text" id="searchInput" placeholder="Pokémon suchen..." />
<button onclick="searchPokemon()">Suchen</button>

<h2>Details</h2>
<div id="pokemonDetail"></div>

<h2>Gesamtsammlung</h2>
<div id="pokemonList">Lädt...</div>
